name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.channel }}
    - env:
        TARGET: ${{ matrix.target }}
        CHANNEL: ${{ matrix.channel }}
        FEATURES: ${{ matrix.features }}
        OP: build
      run: sh ci/run.sh
    strategy:
      matrix:
        target: [ x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu, riscv64gc-unknown-linux-gnu, loongarch64-unknown-linux-gnu]
        channel: [ stable ]
        features: [ "use-syscall", "use-syscall,tls", "use-syscall,lazy-binding", "use-syscall,lazy-binding,tls" ]
        include:
          - target: x86_64-unknown-linux-gnu
            channel: 1.93.0
            features: "use-syscall"
          - target: x86_64-unknown-linux-gnu
            channel: 1.93.0
            features: "use-syscall,tls"
          - target: x86_64-unknown-linux-gnu
            channel: 1.93.0
            features: "use-syscall,lazy-binding"
          - target: x86_64-unknown-linux-gnu
            channel: 1.93.0
            features: "use-syscall,lazy-binding,tls"
          - target: x86_64-unknown-linux-gnu
            channel: stable
            features: "libc"
          - target: x86_64-unknown-linux-gnu
            channel: stable
            features: "libc,tls"
          - target: x86_64-unknown-linux-gnu
            channel: stable
            features: "libc,lazy-binding,tls"
          - target: x86_64-unknown-linux-gnu
            channel: stable
            features: "libc,version"
          - target: x86_64-unknown-linux-gnu
            channel: stable
            features: "libc,log"

  test-linking:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.channel }}
    - env:
        TARGET: ${{ matrix.target }}
        CHANNEL: ${{ matrix.channel }}
        FEATURES: ${{ matrix.features }}
        OP: test
      run: sh ci/run.sh
    strategy:
      matrix:
        target: [ x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu, riscv64gc-unknown-linux-gnu, loongarch64-unknown-linux-gnu, i586-unknown-linux-gnu, arm-unknown-linux-gnueabihf]
        channel: [ stable ]
        features: [ "use-syscall", "use-syscall,tls", "use-syscall,lazy-binding,tls" ]
        include:
          - target: x86_64-unknown-linux-gnu
            channel: stable
            features: "use-syscall,object"
          - target: x86_64-unknown-linux-gnu
            channel: stable
            features: "libc,tls"

  test-mini-loader:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.channel }}
    - name: Set up QEMU and binfmt_misc
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all
    - env:
        TARGET: ${{ matrix.target }}
        CHANNEL: ${{ matrix.channel }}
        ARGS: "target/exec_a"
        OP: run -r -p mini-loader -Zbuild-std=core,alloc,panic_abort
        MINI_LOADER: 1
      run: |
        rustup component add rust-src
        sh ci/run.sh
    strategy:
      matrix:
        target: [ x86_64-unknown-none]
        channel: [ nightly ]

  test-riscv64-object-relocation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly
        components: rust-src
    - name: Install cross
      run: cargo install --locked cross --git https://github.com/cross-rs/cross
    - name: Run RISC-V object relocation tests
      env:
        RUSTFLAGS: -C target-cpu=generic-rv64 -C target-feature=+m,+a,+f,+d,+c,+crt-static
        CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C target-cpu=generic-rv64 -C target-feature=+m,+a,+f,+d,+c,+crt-static
        CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
        CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_AR: riscv64-linux-gnu-ar
      run: cross test --manifest-path tests/riscv64/Cargo.toml -Z build-std=std,panic_unwind --target riscv64gc-unknown-linux-gnu -- --nocapture

  test-windows-loader:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
    - name: Run example
      run: cargo run -p windows-elf-loader --example from_memory

  bench:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.channel }}
    - env:
        TARGET: ${{ matrix.target }}
        CHANNEL: ${{ matrix.channel }}
        FEATURES: ${{ matrix.features }}
        OP: bench
      run: sh ci/run.sh
    strategy:
      matrix:
        target: [ x86_64-unknown-linux-gnu ]
        channel: [ stable ]
        features: [ "use-syscall" ]

  build-no-std:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly
    - env:
        TARGET: x86_64-unknown-none
        CHANNEL: nightly
        OP: build
      run: sh ci/run.sh
